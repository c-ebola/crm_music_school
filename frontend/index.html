<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Music School</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="container">
        <h1>CRM для сети музыкальных школ</h1>
        <p class="subtitle">Тестовая страница: добавление роли</p>

        <section class="card">
            <h2>Добавить роль</h2>
            <form id="role-form">
                <div class="field">
                    <label for="code">Код</label>
                    <input
                        type="text"
                        id="code"
                        name="code"
                        required
                        maxlength="50"
                        placeholder="например, teacher"
                        pattern="[a-z_]+"
                        title="Только латиница в нижнем регистре и подчёркивания"
                    >
                </div>

                <div class="field">
                    <label for="name">Название</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        maxlength="100"
                        placeholder="например, Преподаватель"
                    >
                </div>

                <button type="submit">Создать</button>
            </form>

            <div id="message" class="message hidden"></div>
        </section>

        <section class="card">
            <h2>Список ролей</h2>
            <button id="refresh-btn" class="secondary">Обновить</button>
            <table id="roles-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Код</th>
                        <th>Название</th>
                    </tr>
                </thead>
                <tbody id="roles-tbody">
                    <tr><td colspan="3" class="empty">Загрузка...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
