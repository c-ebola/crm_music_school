<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Главный экран</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .dash-group { margin-top: 24px; }
        .dash-group h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #86868b; margin-bottom: 12px; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .dash-card { display: block; padding: 16px; background: #fff; border: 1px solid #e8e8ed; border-radius: 10px;
                     text-decoration: none; color: #1d1d1f; font-weight: 500; transition: box-shadow .15s, transform .15s; }
        .dash-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="content">
            <header class="page-header">
                <h1>Главный экран</h1>
                <div class="breadcrumb">МузCRM</div>
            </header>
            <section class="card">
                <p id="welcome">Добро пожаловать. Выберите раздел в меню слева.</p>
            </section>
            <div id="admin-dashboard"></div>
        </main>
    </div>
    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script>
        (function () {
            if (!window.Auth) return;
            var GROUPS = [
                { title: 'Оформление учеников', items: [['Новый лид', '/leads'], ['Конверсия в ученика', '/convert']] },
                { title: 'Бухгалтерия', items: [['Каталог абонементов', '/plans'], ['Оформить абонемент', '/subscription-new'], ['Фиксация оплаты', '/payment-new'], ['Финансы ученика', '/student-finance'], ['Подтверждение оплат', '/confirm-payments']] },
                { title: 'Расписание и занятия', items: [['Расписание', '/schedule'], ['Уроки', '/lessons'], ['Расписание ученика', '/student-schedule']] },
                { title: 'Преподаватель', items: [['Моё расписание', '/my-schedule'], ['Домашние задания', '/homeworks']] },
                { title: 'Администрирование', items: [['Пользователи', '/users']] }
            ];
            function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
            window.Auth.getMe().then(function (me) {
                var w = document.getElementById('welcome');
                if (w && me) w.textContent = 'Добро пожаловать, ' + (me.full_name || '') + '.';
                var isAdmin = me && (me.is_superuser || (me.role && me.role.code === 'admin'));
                if (!isAdmin) return;
                if (w) w.textContent = 'Добро пожаловать, ' + (me.full_name || '') + '. Все разделы — ниже.';
                var root = document.getElementById('admin-dashboard');
                root.innerHTML = GROUPS.map(function (g) {
                    var cards = g.items.map(function (it) {
                        return '<a class="dash-card" href="' + it[1] + '">' + esc(it[0]) + '</a>';
                    }).join('');
                    return '<div class="dash-group"><h2>' + esc(g.title) + '</h2><div class="dash-grid">' + cards + '</div></div>';
                }).join('');
            }).catch(function () {});
        })();
    </script>
</body>
</html>
