<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Фиксация оплаты</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .sub-preview { background:#f5f5f7; border-radius:10px; padding:16px; margin:12px 0; display:none; }
        .sub-preview.show { display:block; }
        .sub-preview .row { display:flex; justify-content:space-between; padding:4px 0; font-size:14px; }
        .sub-preview .row span:first-child { color:#86868b; }
        .result { background:#d1f4d1; border-radius:10px; padding:16px; margin-top:16px; display:none; }
        .result.show { display:block; }
        .result .row { display:flex; justify-content:space-between; padding:3px 0; font-size:14px; }
        .big { font-size:20px; font-weight:700; color:#1d6e1d; }
        .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; background:#fff3d1; color:#8a6400; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">♪ МузCRM</div>
            <div class="brand-sub">CRM</div>
            <nav class="nav">
                <a href="/" class="nav-item">Главный экран</a>
                <a href="/plans" class="nav-item">Абонементы</a>
                <a href="/subscription-new" class="nav-item">Оформить абонемент</a>
                <a href="/payment-new" class="nav-item active">Фиксация оплаты</a>
                <a href="/users" class="nav-item">Пользователи</a>
            </nav>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Фиксация оплаты</h1>
                <div class="breadcrumb">Привязка платежа к абонементу</div>
            </header>

            <section class="card">
                <form id="pay-form">
                    <div class="field">
                        <label for="f_sub">Абонемент *</label>
                        <select id="f_sub" required>
                            <option value="">— выберите абонемент —</option>
                        </select>
                    </div>

                    <div class="sub-preview" id="sub-preview"></div>

                    <div class="grid-2">
                        <div class="field">
                            <label for="f_amount">Сумма, ₽ *</label>
                            <input type="number" id="f_amount" min="0.01" step="0.01" required>
                        </div>
                        <div class="field">
                            <label for="f_method">Способ оплаты *</label>
                            <select id="f_method" required>
                                <option value="cash">Наличные</option>
                                <option value="card">Карта</option>
                                <option value="transfer">Перевод</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="f_date">Дата оплаты</label>
                            <input type="date" id="f_date">
                            <div style="font-size:13px; color:#86868b; margin-top:4px;">Если пусто — сегодня</div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="f_comment">Примечание</label>
                        <textarea id="f_comment" rows="2"></textarea>
                    </div>

                    <div id="message" class="message hidden"></div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Зафиксировать оплату</button>
                    </div>
                </form>

                <div class="result" id="result"></div>
            </section>
        </main>
    </div>
    <script src="/payment-new.js"></script>
</body>
</html>
