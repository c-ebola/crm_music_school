<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Домашние задания</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .hw-layout { display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start; }
        @media (max-width:900px){ .hw-layout{ grid-template-columns:1fr; } }
        .panel { background:#fff; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .panel-create { padding:24px; position:sticky; top:24px; }
        .panel h2 { font-size:16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:baseline; }
        .count { color:#86868b; font-size:13px; font-weight:400; }
        .create-field { margin-bottom:14px; display:flex; flex-direction:column; position:relative; }
        .create-field label { font-size:13px; font-weight:500; margin-bottom:5px; }
        .ta-wrap { position:relative; }
        .clear-x { position:absolute; right:8px; top:8px; cursor:pointer; color:#86868b; background:none; border:none; font-size:16px; }
        .sug { position:absolute; z-index:20; left:0; right:0; top:64px; background:#fff; border:1px solid #e8e8ed;
               border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,.1); max-height:240px; overflow:auto; }
        .sug-item { padding:9px 12px; cursor:pointer; font-size:14px; display:flex; justify-content:space-between; gap:8px; }
        .sug-item:hover { background:#f0f4ff; }
        .sug-sub { color:#86868b; font-size:12px; }
        .sug-empty { padding:9px 12px; color:#86868b; font-size:13px; }
        .filters { display:flex; gap:10px; flex-wrap:wrap; padding:18px 20px; border-bottom:1px solid #e8e8ed; }
        .filters .grow { flex:1; min-width:160px; }
        .list-body { padding:20px; display:flex; flex-direction:column; gap:14px; }
        .hw-card { border:1px solid #e8e8ed; border-left:3px solid #4a73e8; border-radius:10px; padding:16px; }
        .hw-card:has(.badge.done) { border-left-color:#2e9e4f; }
        .hw-top { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
        .hw-student { font-weight:600; font-size:15px; }
        .hw-desc { font-size:14px; white-space:pre-wrap; margin-bottom:10px; }
        .hw-clabel { font-size:12px; color:#86868b; }
        .hw-comment { width:100%; margin:4px 0 10px; resize:vertical; }
        .hw-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .hw-foot { color:#a1a1a6; font-size:11px; margin-top:8px; }
        .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
        .badge.done { background:#e7f6ea; color:#1f7a3d; }
        .badge.open { background:#fff3e0; color:#9a6400; }
        .btn-del { border:1px solid #e8c4c4; background:#fff; color:#c0392b; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
        .btn-del:hover { background:#fdeeee; }
        .confirm-row { display:inline-flex; gap:6px; }
        .btn-confirm { background:#c0392b; color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
        .btn-cancel { background:#f0f0f3; border:none; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
        .empty { color:#86868b; padding:24px 4px; text-align:center; }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="content" style="max-width:1200px;">
            <header class="page-header">
                <h1>Домашние задания</h1>
                <div class="breadcrumb" id="who">—</div>
            </header>
            <div class="hw-layout">
                <section class="panel panel-create">
                    <h2>Новое задание</h2>
                    <form id="hw-form">
                        <div class="create-field">
                            <label>Ученик</label>
                            <div class="ta-wrap">
                                <input type="text" id="hw-student-input" placeholder="Начните вводить имя...">
                                <button type="button" id="hw-student-clear" class="clear-x hidden">&times;</button>
                            </div>
                            <div id="hw-student-sug" class="sug hidden"></div>
                        </div>
                        <div class="create-field">
                            <label for="hw-desc">Текст задания</label>
                            <textarea id="hw-desc" rows="4" placeholder="Что нужно сделать..."></textarea>
                        </div>
                        <div id="create-msg" class="message hidden"></div>
                        <button type="submit" class="btn-primary" style="width:100%;">Создать задание</button>
                    </form>
                </section>
                <section class="panel">
                    <div class="filters">
                        <input type="text" id="f-search" class="grow" placeholder="Поиск по ученику или тексту...">
                        <select id="f-status">
                            <option value="">Все</option>
                            <option value="open">В работе</option>
                            <option value="done">Выполненные</option>
                        </select>
                    </div>
                    <div style="padding:14px 20px 0;"><h2>Список <span class="count" id="hw-count"></span></h2></div>
                    <div id="hw-list" class="list-body"></div>
                    <div id="hw-empty" class="empty hidden">Заданий нет.</div>
                </section>
            </div>
        </main>
    </div>
    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/pages/homeworks/homeworks.js"></script>
</body>
</html>
