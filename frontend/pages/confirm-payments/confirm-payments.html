<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Подтверждение оплат</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .warn { background:#fff3d1; color:#8a6400; border-radius:10px; padding:12px 16px; margin-bottom:16px; }
        .warn a { color:#0058b8; }
        .btn-ok { background:#1d6e1d; color:#fff; border:none; border-radius:8px; padding:6px 14px; cursor:pointer; margin-right:6px; }
        .btn-no { background:#fadcdc; color:#8c1f1f; border:none; border-radius:8px; padding:6px 14px; cursor:pointer; }
        .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; background:#fff3d1; color:#8a6400; }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>

        <main class="content">
            <header class="page-header">
                <h1>Подтверждение оплат</h1>
                <div class="breadcrumb">Платежи в ожидании подтверждения</div>
            </header>

            <div id="auth-warn" class="warn hidden">
                Чтобы подтверждать оплаты, войдите как администратор. <a href="/login">Войти</a>
            </div>

            <section class="card">
                <table>
                    <thead>
                        <tr><th>№</th><th>Дата</th><th>Ученик</th><th>Тариф</th><th>Сумма</th><th>Способ</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="pays-tbody">
                        <tr><td colspan="7" class="empty">Загрузка...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/pages/confirm-payments/confirm-payments.js"></script>
</body>
</html>
