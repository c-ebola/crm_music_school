<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МузCRM — Мой кабинет</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .sec { margin-bottom:22px; }
    .sec h2 { font-size:17px; margin-bottom:12px; }
    .row-item { display:flex; align-items:center; gap:14px; border:1px solid #e8e8ed; border-radius:12px; padding:12px 16px; margin-bottom:8px; background:#fff; }
    .ri-when { width:96px; flex-shrink:0; }
    .ri-date { font-size:13px; color:#86868b; }
    .ri-time { font-weight:600; font-size:14px; }
    .ri-main { flex:1; }
    .ri-title { font-weight:600; }
    .ri-sub { font-size:13px; color:#86868b; margin-top:2px; }
    .ri-status { font-size:12px; padding:3px 10px; border-radius:10px; background:#eef; }
    .st-scheduled { background:#e6efff; color:#2456b3; }
    .st-completed { background:#d1f4d1; color:#1d6e1d; }
    .st-cancelled { background:#fadcdc; color:#8c1f1f; }
    .hw-item { border:1px solid #e8e8ed; border-radius:12px; padding:14px 16px; margin-bottom:8px; background:#fff; }
    .hw-item.done { opacity:.7; }
    .hw-top { display:flex; gap:10px; align-items:center; margin-bottom:6px; }
    .hw-status { font-size:12px; padding:2px 9px; border-radius:10px; }
    .s-open { background:#fff3d1; color:#8a6400; }
    .s-done { background:#d1f4d1; color:#1d6e1d; }
    .hw-teacher { font-size:12px; color:#86868b; }
    .hw-desc { font-size:14px; white-space:pre-wrap; }
    .hw-comment { font-size:13px; color:#555; margin-top:6px; border-left:3px solid #e0e0e5; padding-left:10px; }
    .empty { color:#a1a1a6; font-size:14px; padding:8px 0; }
  </style>
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="content">
      <header class="page-header">
        <h1 id="hello">Мой кабинет</h1>
        <div class="breadcrumb" id="subtitle"></div>
      </header>
      <section class="sec">
        <h2>Моё расписание</h2>
        <div id="schedule"><div class="empty">Загрузка…</div></div>
      </section>
      <section class="sec">
        <h2>Домашние задания</h2>
        <div id="homeworks"><div class="empty">Загрузка…</div></div>
      </section>
    </main>
  </div>
  <script src="/shared/auth.js"></script>
  <script src="/shared/nav.js"></script>
  <script src="/pages/portal/portal.js"></script>
</body>
</html>
