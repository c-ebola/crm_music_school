<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Расписание</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .toolbar { display:flex; gap:14px; align-items:flex-end; margin-bottom:16px; }
        .grid { width:100%; border-collapse:collapse; }
        .grid th, .grid td { border:1px solid #e5e5ea; padding:10px; vertical-align:top; }
        .grid th { background:#f5f5f7; text-align:left; }
        .qtime { width:130px; font-weight:600; white-space:nowrap; }
        .slot { min-height:48px; }
        .sess { background:#e3f0ff; border-radius:8px; padding:8px 10px; margin-bottom:6px; font-size:13px; position:relative; }
        .sess .del { position:absolute; top:4px; right:8px; cursor:pointer; color:#8c1f1f; border:none; background:none; font-size:14px; }
        .sess .disc { font-weight:600; }
        .sess .meta { color:#555; }
        .add-btn { background:none; border:1px dashed #c7c7cc; border-radius:8px; padding:6px 10px; cursor:pointer; color:#0058b8; font-size:13px; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; }
        .overlay.show { display:flex; }
        .modal { background:#fff; border-radius:12px; padding:24px; width:420px; }
        .modal h2 { font-size:18px; margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">♪ МузCRM</div>
            <div class="brand-sub">CRM</div>
            <nav class="nav">
                <a href="/" class="nav-item">Главный экран</a>
                <a href="/schedule" class="nav-item active">Расписание</a>
                <a href="/plans" class="nav-item">Абонементы</a>
                <a href="/student-finance" class="nav-item">Финансы ученика</a>
                <a href="/users" class="nav-item">Пользователи</a>
            </nav>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Расписание</h1>
                <div class="breadcrumb">Занятия по квантам времени</div>
            </header>

            <div class="toolbar">
                <div class="field" style="margin:0;">
                    <label for="day">День</label>
                    <input type="date" id="day">
                </div>
            </div>

            <section class="card">
                <table class="grid">
                    <thead>
                        <tr><th class="qtime">Время</th><th>Занятия</th><th style="width:120px;"></th></tr>
                    </thead>
                    <tbody id="grid-body"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <h2 id="modal-title">Добавить занятие</h2>
            <div class="field">
                <label for="m_lesson">Занятие (тип) *</label>
                <select id="m_lesson"></select>
            </div>
            <div class="field">
                <label for="m_room">Кабинет</label>
                <select id="m_room"></select>
            </div>
            <div id="modal-message" class="message hidden"></div>
            <div class="form-actions">
                <button type="button" class="btn-ghost" id="m_cancel">Отмена</button>
                <button type="button" class="btn-primary" id="m_save">Добавить</button>
            </div>
        </div>
    </div>
    <div class="overlay" id="students-overlay">
            <div class="modal" style="width:480px;">
                <h2 id="st-title">Ученики занятия</h2>
                <div id="st-info" style="color:#86868b; font-size:13px; margin-bottom:8px;"></div>
                <div id="st-capacity" style="font-weight:600; margin-bottom:10px;"></div>
                <div id="st-list"></div>
                <div class="field" style="margin-top:14px;">
                    <label>Записать ученика</label>
                    <div style="display:flex; gap:8px;">
                        <select id="st-eligible" style="flex:1;"></select>
                        <button type="button" class="btn-primary" id="st-enroll">Записать</button>
                    </div>
                    <div style="font-size:13px; color:#86868b; margin-top:4px;">
                        Список отфильтрован по дисциплине и филиалу занятия
                    </div>
                </div>
                <div id="st-message" class="message hidden"></div>
                <div class="form-actions">
                    <button type="button" class="btn-ghost" id="st-close">Закрыть</button>
                </div>
            </div>
    </div>
    <script src="/pages/schedule/schedule.js"></script>
</body>
</html>
