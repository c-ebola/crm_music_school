<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Моё расписание</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .week-toolbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
        .week-toolbar .range { font-weight:600; min-width:170px; text-align:center; }
        .week-toolbar select { width:auto; min-width:220px; }
        .btn-nav {
            padding:8px 14px; border:1px solid #d2d2d7; border-radius:8px;
            background:#fff; cursor:pointer; font-size:14px;
        }
        .btn-nav:hover { background:#f0f0f3; }

        .week-grid { width:100%; border-collapse:collapse; table-layout:fixed; }
        .week-grid th, .week-grid td {
            border:1px solid #e8e8ed; vertical-align:top; padding:6px;
        }
        .week-grid th { background:#fafafa; font-size:12px; font-weight:600; }
        .week-grid .qtime {
            width:64px; background:#fafafa; font-size:12px; color:#86868b;
            text-align:center; white-space:nowrap; vertical-align:middle;
        }
        .week-grid th.today { background:#1d1d1f; color:#fff; }
        .week-grid td.today { background:#f6f6fb; }
        .day-h .dow { font-size:13px; }
        .day-h .date { font-size:11px; color:#86868b; font-weight:400; }
        .day-h.today .date { color:#d0d0d0; }

        .lesson-chip {
            background:#eef3ff; border:1px solid #d6e0ff; border-left:3px solid #4a73e8;
            border-radius:8px; padding:6px 8px; margin-bottom:6px; font-size:12px;
        }
        .lesson-chip .disc { font-weight:600; }
        .lesson-chip .meta { color:#86868b; margin-top:2px; }
        .lesson-chip.cancelled { background:#fdeeee; border-color:#f3caca; border-left-color:#d33; opacity:.75; }
        .lesson-chip.done { background:#eef7ef; border-color:#cfe6d2; border-left-color:#2e9e4f; }
        .empty-week { color:#86868b; padding:20px 4px; }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>

        <main class="content">
            <header class="page-header">
                <h1>Моё расписание на неделю</h1>
                <div class="breadcrumb" id="who">—</div>
            </header>

            <div class="week-toolbar">
                <button class="btn-nav" id="prev">← Неделя</button>
                <span class="range" id="range">—</span>
                <button class="btn-nav" id="next">Неделя →</button>
                <button class="btn-nav" id="today-btn">Сегодня</button>
                <select id="teacher-sel" class="hidden"></select>
            </div>

            <section class="card">
                <table class="week-grid">
                    <thead><tr id="grid-head"></tr></thead>
                    <tbody id="grid-body"></tbody>
                </table>
                <div class="empty-week hidden" id="empty">На эту неделю занятий нет.</div>
            </section>
        </main>
    </div>

    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/shared/labels.js"></script>
    <script src="/pages/my-schedule/my-schedule.js"></script>
</body>
</html>
