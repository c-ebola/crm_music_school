<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Абонементы</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; }
        .on { background:#d1f4d1; color:#1d6e1d; }
        .off { background:#eee; color:#888; }
        .price { font-weight:600; }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>

        <main class="content">
            <header class="page-header">
                <h1>Каталог абонементов</h1>
                <div class="breadcrumb">Тарифы для оформления ученикам</div>
            </header>

            <section class="card">
                <h2 style="font-size:16px; margin-bottom:14px;">Новый абонемент</h2>
                <form id="plan-form">
                    <div class="grid-2">
                        <div class="field">
                            <label>Название *</label>
                            <input type="text" id="f_name" placeholder="8 занятий / месяц" required>
                        </div>
                        <div class="field">
                            <label>Количество занятий *</label>
                            <input type="number" id="f_lessons" min="1" value="8" required>
                        </div>
                        <div class="field">
                            <label>Цена, ₽ *</label>
                            <input type="number" id="f_price" min="0" step="0.01" value="6000" required>
                        </div>
                        <div class="field">
                            <label>Срок действия, дней *</label>
                            <input type="number" id="f_duration" min="1" value="30" required>
                        </div>
                    </div>
                    <div class="field">
                        <label>Описание</label>
                        <textarea id="f_description" rows="2"></textarea>
                    </div>
                    <label style="display:flex; align-items:center; gap:8px; margin:8px 0;">
                        <input type="checkbox" id="f_active" checked> Активен (доступен для оформления)
                    </label>
                    <div id="message" class="message hidden"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Добавить абонемент</button>
                    </div>
                </form>
            </section>

            <section class="card" style="margin-top:20px;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Название</th><th>Занятий</th><th>Цена</th><th>Срок</th><th>Статус</th><th></th></tr>
                    </thead>
                    <tbody id="plans-tbody">
                        <tr><td colspan="7" class="empty">Загрузка...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/pages/plans/plans.js"></script>
</body>
</html>
