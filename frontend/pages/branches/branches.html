<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МузCRM — Филиалы</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .br-layout { display:grid; grid-template-columns:360px 1fr; gap:24px; align-items:start; }
        @media (max-width:900px){ .br-layout{ grid-template-columns:1fr; } }
        .panel { background:#fff; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .panel-create { padding:24px; position:sticky; top:24px; }
        .panel h2 { font-size:16px; margin-bottom:16px; }
        .create-field { margin-bottom:14px; display:flex; flex-direction:column; }
        .create-field label { font-size:13px; font-weight:500; margin-bottom:5px; }
        .checkline { flex-direction:row; align-items:center; gap:8px; }
        .checkline input { width:auto; }
        .list-body { padding:20px; }
        .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
        .br-card { border:1px solid #e8e8ed; border-radius:10px; padding:14px; background:#fff; }
        .br-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.08); }
        .br-name { font-weight:600; font-size:15px; }
        .br-sub { color:#555; font-size:13px; margin-top:4px; }
        .br-foot { display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:10px; border-top:1px solid #f0f0f3; }
        .br-id { color:#a1a1a6; font-size:11px; }
        .badge { display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; }
        .badge.school { background:#eaf0ff; color:#2c4fc0; }
        .badge.venue { background:#fdeecf; color:#8a5b00; }
        .badge.off { background:#f0f0f3; color:#86868b; }
        .actions { display:flex; gap:6px; }
        .btn-edit { border:1px solid #d2d2d7; background:#fff; border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; }
        .btn-edit:hover { background:#f5f5f7; }
        .btn-del { border:1px solid #e8c4c4; background:#fff; color:#c0392b; border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; }
        .btn-del:hover { background:#fdeeee; }
        .empty, .loading { color:#86868b; padding:30px 4px; text-align:center; }
    </style>
</head>
<body>
    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="content" style="max-width:1200px;">
            <header class="page-header">
                <h1>Филиалы и площадки</h1>
                <div class="breadcrumb">Справочник: учебные филиалы и концертные площадки</div>
            </header>

            <div class="br-layout">
                <section class="panel panel-create">
                    <h2 id="form-title">Новый филиал</h2>
                    <form id="branch-form">
                        <input type="hidden" id="b-id">
                        <div class="create-field">
                            <label for="b-name">Название <span class="req">*</span></label>
                            <input type="text" id="b-name" maxlength="150" placeholder="Центральный" required>
                        </div>
                        <div class="create-field">
                            <label for="b-kind">Тип</label>
                            <select id="b-kind">
                                <option value="school">Учебный филиал</option>
                                <option value="venue">Концертная площадка</option>
                            </select>
                        </div>
                        <div class="create-field">
                            <label for="b-city">Город</label>
                            <input type="text" id="b-city" maxlength="100" placeholder="Москва">
                        </div>
                        <div class="create-field">
                            <label for="b-address">Адрес</label>
                            <input type="text" id="b-address" maxlength="300" placeholder="ул. Ленина, 1">
                        </div>
                        <div class="create-field checkline">
                            <input type="checkbox" id="b-active" checked>
                            <label for="b-active" style="margin:0;">Активен</label>
                        </div>
                        <div id="form-msg" class="message hidden"></div>
                        <div style="display:flex; gap:8px;">
                            <button type="submit" class="btn-primary" id="save-btn">Создать</button>
                            <button type="button" class="btn-ghost hidden" id="cancel-btn">Отмена</button>
                        </div>
                    </form>
                </section>

                <section class="panel">
                    <div class="list-body">
                        <h2>Список <span id="br-count"></span></h2>
                        <div id="br-loading" class="loading">Загрузка...</div>
                        <div id="br-empty" class="empty hidden">Пока нет ни одного филиала</div>
                        <div class="cards" id="br-cards"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/shared/auth.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/pages/branches/branches.js"></script>
</body>
</html>
