<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МузCRM — Воронка продаж</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .funnel-top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
    .funnel-filters { display:flex; gap:10px; align-items:center; }
    .funnel-filters select { width:auto; min-width:160px; }
    .btn-dark { background:#1d1d1f; color:#fff; border:none; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:500; cursor:pointer; }
    .board { display:flex; gap:14px; margin-top:20px; align-items:flex-start; overflow-x:auto; padding-bottom:8px; }
    .fcol { flex:1 1 0; min-width:200px; display:flex; flex-direction:column; gap:10px; }
    .fcol-head { border-radius:10px; padding:12px 14px; text-align:center; }
    .fh-title { font-size:13px; font-weight:600; }
    .fh-pct { font-size:12px; margin-top:2px; opacity:.8; }
    .stage-new { background:#ecebfb; color:#3b2f8f; }
    .stage-in_progress { background:#e6f0fb; color:#1f5fa8; }
    .stage-trial_scheduled { background:#fbf0dc; color:#8a6400; }
    .stage-contract { background:#e3f1ea; color:#1d6e3f; }
    .stage-converted { background:#1d1d1f; color:#fff; }
    .stage-rejected { background:#f0f0f3; color:#6e6e73; }
    .fcol[data-stage="rejected"] .fcol-body { background:#f8f8fa; }
    .fcol-sub { display:flex; justify-content:space-between; align-items:center; font-size:13px; color:#6e6e73; padding:0 4px; }
    .fcol-sub .fcount { background:#e8e8ed; color:#1d1d1f; border-radius:10px; padding:1px 9px; font-size:12px; font-weight:600; }
    .fcol-body { background:#f0f0f3; border-radius:10px; padding:10px; min-height:120px; display:flex; flex-direction:column; gap:10px; transition:background .15s; }
    .fcol-body.over { background:#e2e2ea; outline:2px dashed #b6b6c0; outline-offset:-4px; }
    .fcol[data-stage="converted"] .fcol-body { background:#e3f1ea; }
    .fcard { background:#fff; border:1px solid #e8e8ed; border-radius:9px; padding:11px 13px; cursor:grab; transition:box-shadow .15s; }
    .fcard:hover { box-shadow:0 3px 10px rgba(0,0,0,.07); }
    .fcard.dragging { opacity:.45; }
    .fcard[draggable="false"] { cursor:default; }
    .fc-name { font-weight:600; font-size:14px; }
    .fc-sub { font-size:12px; color:#86868b; margin-top:2px; }
    .funnel-empty { color:#a1a1a6; font-size:13px; text-align:center; padding:8px 0; }
  </style>
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="content" style="max-width:none;">
      <div class="funnel-top">
        <header class="page-header">
          <h1>Воронка продаж</h1>
          <div class="breadcrumb">Все лиды по стадиям — перетаскивание для смены статуса</div>
        </header>
        <div class="funnel-filters">
          <select id="f-channel">
            <option value="">Все источники</option>
            <option value="website">Сайт</option>
            <option value="phone">Звонок</option>
            <option value="social">Соцсети</option>
            <option value="referral">Сарафан</option>
            <option value="advertising">Реклама</option>
            <option value="other">Другое</option>
          </select>
          <select id="f-discipline"><option value="">Все дисциплины</option></select>
          <button id="btn-new" class="btn-dark">+ Новый лид</button>
        </div>
      </div>
      <div id="board" class="board"></div>
    </main>
  </div>
  <script src="/shared/auth.js"></script>
  <script src="/shared/nav.js"></script>
  <script src="/pages/funnel/funnel.js"></script>
</body>
</html>
