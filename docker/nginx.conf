server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Все запросы к / пытаемся отдать как файл, иначе index.html
    # (это понадобится позже, когда будет React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси на бэкенд: всё, что начинается с /api,
    # переправляем в контейнер backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck бэкенда тоже прокидываем
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Не кешируем HTML, чтобы изменения сразу подхватывались
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}