server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Роуты для веб-страниц (человекочитаемые URL)

    # Корень → перенаправляем на страницу входа
    location = / {
        return 302 /login;
    }

    # Страница входа
    location = /login {
        try_files /login.html =404;
    }

    # Управление пользователями
    location = /users {
        try_files /users.html =404;
    }

    # Создание лида
    location = /leads/new {
        try_files /lead-new.html =404;
    }

    # Старая тестовая страница ролей (на всякий случай)
    location = /roles {
        try_files /index.html =404;
    }

    #  API: проксируем на бэкенд
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck бэкенда
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    location ~* \.(html|js)$ {
        add_header Cache-Control "no-store, must-revalidate";
    }

    location /shared/ {
        add_header Cache-Control "no-store, must-revalidate";
    }

    #  Статика (CSS, JS) 
    # Отдаём файлы как есть; если не найден — 404
    location / {
        try_files $uri $uri/ =404;
    }
}
